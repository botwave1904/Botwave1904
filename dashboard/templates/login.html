<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botwave — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-container{width:100%;max-width:400px;padding:2rem}
.logo{text-align:center;margin-bottom:2.5rem}
.logo h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#0891b2,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:#64748b;font-size:.9rem;margin-top:.5rem}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:2rem}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#94a3b8;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.form-group input{width:100%;padding:.75rem 1rem;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:1rem;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:#0891b2;box-shadow:0 0 0 3px rgba(8,145,178,.15)}
.btn{width:100%;padding:.85rem;background:linear-gradient(135deg,#0891b2,#3b82f6);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1.25rem;text-align:center}
.footer{text-align:center;margin-top:1.5rem;color:#475569;font-size:.8rem}
.footer a{color:#0891b2;text-decoration:none}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>Botwave</h1>
        <p>AI Automation Platform</p>
    </div>
    <div class="card">
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
    <div class="footer">
        <p>Botwave Inc. &mdash; <a href="/health">System Status</a></p>
    </div>
</div>
</body>
</html>
